name: ETF 전종목 목록 월간 갱신

on:
  schedule:
    - cron: '0 1 1 * *'  # 매월 1일 오전 10시 KST (UTC 01:00)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: requests 설치
        run: pip install requests

      - name: ETF 목록 갱신
        run: python scripts/fetch-etf-list.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/static/etf-list.json
          git diff --staged --quiet || (
            git commit -m "chore: ETF 전종목 목록 월간 갱신 [skip ci]" &&
            git push
          )
